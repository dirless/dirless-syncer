[backend]
url              = "https://yourname.dirless.com"   # your Dirless subdomain
enrollment_token = "your-token-here"                # from your portal dashboard; only needed on first start

# [identity_center]
# identity_store_id = "d-1234567890"  # normally auto-detected via SSO Admin API
# region            = "us-east-1"     # normally auto-detected from EC2 IMDS

[syncer]
id = "syncer-prod-01"               # unique, stable ID for this syncer instance
interval_seconds = 300              # sync every 5 minutes
heartbeat_interval_seconds = 10     # renew lease every 10s while syncing

[tls]
cert_path = "/etc/dirless/client.crt"
key_path  = "/etc/dirless/client.key"
ca_path   = "/etc/dirless/ca.crt"
