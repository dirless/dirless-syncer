name: dirless-syncer
version: 0.2.0

description: Sync AWS IAM Identity Center users to Dirless-enrolled Linux nodes

authors:
  - Dirless <info@dirless.com>

license: Apache-2.0

crystal: ">= 1.20.0"

dependencies:
  toml:
    github: crystal-community/toml.cr
    version: "~> 0.8.1"
  dirless-http:
    github: dirless/dirless-http
  age-crystal:
    github: dirless/age-crystal
    version: 0.2.0
  x509-crystal:
    github: dirless/x509-crystal
    version: 0.2.1

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
  webmock:
    github: manastech/webmock.cr
    branch: master
